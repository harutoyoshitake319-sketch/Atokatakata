<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D ペットシミュレーター🐾 - Multi Targets</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; background: #87CEEB; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .panel { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; pointer-events: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    #header { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: bold; color: #333; }
    .stage-text { font-size: 24px; color: #0284c7; margin-bottom: 5px; }
    
    /* 画面中央上のエリア進捗バー（原作風） */
    #progress-container {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      width: 300px; text-align: center; pointer-events: auto;
    }
    #progress-label { font-weight: bold; font-size: 16px; color: #333; text-shadow: 1px 1px 0 #fff; margin-bottom: 4px; }
    #progress-bg { background: #334155; height: 20px; border-radius: 10px; border: 3px solid #fff; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    #progress-bar { background: #06b6d4; width: 0%; height: 100%; transition: width 0.2s; }

    #inventory { position: absolute; top: 20px; right: 20px; width: 220px; max-height: 70%; overflow-y: auto; }
    
    #gacha-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 15px 40px; font-size: 22px; font-weight: bold; background: #10b981; color: white;
      border: none; border-radius: 50px; cursor: pointer; pointer-events: auto;
      box-shadow: 0 5px 0 #047857; transition: transform 0.1s;
    }
    #gacha-btn:active { transform: translate(-50%, 5px); box-shadow: none; }
    
    #notification {
      position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; font-weight: bold; text-align: center; display: none;
      text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff; z-index: 10;
    }
    .pet-item { padding: 5px; border-bottom: 1px solid #ccc; font-size: 14px; cursor: pointer; }
    .pet-item.equipped { background: #e0e7ff; font-weight: bold; }

    /* 各ターゲットの頭上に浮かぶ文字のコンテナ */
    #billboard-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .billboard {
      position: absolute; text-align: center; transform: translate(-50%, -100%);
      font-weight: bold; color: white; font-size: 13px;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui-layer">
    <div id="header" class="panel">
      <div id="stage-display" class="stage-text">エリア 1</div>
      💰 コイン: <span id="coin-count">100</span><br>
      ⚔️ クリックパワー: <span id="power-count">1</span>
    </div>
    
    <div id="progress-container">
      <div id="progress-label">Next Area (0%)</div>
      <div id="progress-bg"><div id="progress-bar"></div></div>
    </div>
    
    <div id="inventory" class="panel">
      <div style="font-weight:bold; margin-bottom:10px;">🐾 ペット (装備: <span id="equip-count">0</span>/3)</div>
      <div id="pet-list"></div>
    </div>

    <button id="gacha-btn" onclick="rollGacha()">🥚 ガチャ (<span id="gacha-cost-display">100</span>💰)</button>
    <div id="notification"></div>
    
    <div id="billboard-container"></div>
  </div>

  <script>
    // --- 数字の省略表示 ---
    function formatNum(num) {
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return Math.floor(num).toString();
    }

    // --- ゲーム変数 ---
    let currentStage = 1;
    let coins = 100;
    let clickPower = 1;
    let inventory = [];
    let equippedIds = [];
    
    let stageProgress = 0; // 0から100まで貯まると次のエリアへ
    const progressToClear = 100;

    // ターゲットの種類
    const targetTypes = [
      { name: 'コインの山🪙', hp: 10, reward: 5, color: 0xeab308, scale: [0.8, 0.4, 0.8] },
      { name: '木の箱📦', hp: 30, reward: 15, color: 0xb45309, scale: [1.2, 1.2, 1.2] },
      { name: 'プレゼント🎁', hp: 60, reward: 35, color: 0xef4444, scale: [1.0, 1.0, 1.0] },
      { name: '巨大金庫💎', hp: 200, reward: 120, color: 0x06b6d4, scale: [2.0, 2.0, 2.0] }
    ];

    const rarities = {
      Common: { name: 'コモン', color: 0x94a3b8, weight: 5000, mult: 1, htmlColor: '#94a3b8' },
      Uncommon: { name: 'アンコモン', color: 0x22c55e, weight: 2500, mult: 3, htmlColor: '#22c55e' },
      Rare: { name: 'レア', color: 0x3b82f6, weight: 1500, mult: 8, htmlColor: '#3b82f6' },
      Epic: { name: 'エピック', color: 0xa855f7, weight: 700, mult: 25, htmlColor: '#a855f7' },
      Legendary: { name: 'レジェンダリー', color: 0xeab308, weight: 250, mult: 80, htmlColor: '#eab308' },
      Mythical: { name: 'ミシカル', color: 0xec4899, weight: 50, mult: 300, htmlColor: '#ec4899' }
    };

    const petTemplates = [
      { name: 'イヌ🐶', rarity: 'Common' }, { name: 'ネコ🐱', rarity: 'Common' },
      { name: 'キツネ🦊', rarity: 'Uncommon' }, { name: 'クマ🐻', rarity: 'Uncommon' },
      { name: 'ウシ🐮', rarity: 'Rare' }, { name: 'ペンギン🐧', rarity: 'Rare' },
      { name: 'ユニコーン🦄', rarity: 'Epic' }, { name: 'ドラゴン🐉', rarity: 'Epic' },
      { name: '不死鳥🦅', rarity: 'Legendary' }, { name: 'ロボット🤖', rarity: 'Legendary' },
      { name: 'キングイヌ👑', rarity: 'Mythical' }, { name: '神龍⚡', rarity: 'Mythical' }
    ];

    // --- 3D空間構築 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 12, 16); // 見下ろし型視点に変更
    camera.lookAt(0, -1, 2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.4);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // 広めの地面
    const floorGeo = new THREE.PlaneGeometry(60, 60);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x4ade80 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 管理用データ配列
    let targets = [];          // 画面内の箱やコイン
    let activePetMeshes = [];  // 装備中ペットの3Dモデル

    // --- 計算システム ---
    function getGachaCost() { return 100 * Math.pow(1.5, currentStage - 1); }
    function getStageScale() { return Math.pow(1.4, currentStage - 1); }

    // --- ターゲット（敵）の生成システム ---
    function spawnTarget() {
      if (targets.length >= 8) return; // 画面内に最大8個まで自動生成

      // ランダムなターゲットの種類を選択（巨大金庫は低確率）
      let typeIndex = Math.floor(Math.random() * (targetTypes.length - 1));
      if(Math.random() < 0.1) typeIndex = targetTypes.length - 1; // 10%で金庫
      const type = targetTypes[typeIndex];

      const scaleMultiplier = getStageScale();
      const maxHp = type.hp * scaleMultiplier;

      // 3Dモデル生成
      const geo = new THREE.BoxGeometry(type.scale[0], type.scale[1], type.scale[2]);
      const mat = new THREE.MeshLambertMaterial({ color: type.color });
      const mesh = new THREE.Mesh(geo, mat);

      // ランダムな位置に配置（中央の広場に散りばめる）
      mesh.position.set(
        (Math.random() - 0.5) * 16,
        type.scale[1] / 2,
        (Math.random() - 0.5) * 12 + 2
      );
      scene.add(mesh);

      // 看板UI（Billboard）のHTML作成
      const bEles = document.getElementById('billboard-container');
      const bDiv = document.createElement('div');
      bDiv.className = 'billboard';
      bDiv.innerHTML = `<div>${type.name}</div><div class="hp-text"></div>`;
      bEles.appendChild(bDiv);

      const targetData = {
        id: Math.random().toString(),
        mesh: mesh,
        billboard: bDiv,
        type: type,
        maxHp: maxHp,
        hp: maxHp,
        reward: type.reward * scaleMultiplier
      };
      
      targets.push(targetData);
      updateBillboardText(targetData);
    }

    function updateBillboardText(t) {
      const hpText = t.billboard.querySelector('.hp-text');
      hpText.innerText = `${formatNum(t.hp)} / ${formatNum(t.maxHp)}`;
    }

    // --- ダメージ・破壊処理 ---
    function damageTarget(t, damage) {
      t.hp -= damage;
      // 叩かれたアニメーション（一瞬小さく）
      t.mesh.scale.set(0.8, 0.8, 0.8);
      setTimeout(() => { if(t.mesh) t.mesh.scale.set(1,1,1); }, 80);

      if (t.hp <= 0) {
        // 破壊成功！報酬獲得
        coins += t.reward;
        
        // 経験値（進捗）を加算
        stageProgress += (t.type.name.includes('巨大') ? 25 : 10);
        
        // エリアクリア判定
        if (stageProgress >= progressToClear) {
          stageProgress = 0;
          currentStage++;
          showNotification(`🎉 エリア ${currentStage} のロック解除！`, '#06b6d4');
          // エリア変更演出（床の色など変化）
          const colors = [0x4ade80, 0xd97706, 0x334155, 0xe0f2fe, 0x7c3aed];
          floor.material.color.setHex(colors[currentStage % colors.length]);
        }

        // 3DとUIから完全に削除
        scene.remove(t.mesh);
        t.billboard.remove();
        targets = targets.filter(x => x.id !== t.id);

        // ペットのターゲットをリセット
        activePetMeshes.forEach(p => {
          if (p.userData.targetId === t.id) p.userData.targetId = null;
        });

        // 即座に新しい敵を補充
        spawnTarget();
      } else {
        updateBillboardText(t);
      }
      updateUI();
    }

    // --- プレイヤーのクリック攻撃 ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('pointerdown', (event) => {
      if(event.target.tagName !== 'CANVAS') return;
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      
      const meshes = targets.map(t => t.mesh);
      const intersects = raycaster.intersectObjects(meshes);
      
      if (intersects.length > 0) {
        const hitMesh = intersects[0].object;
        const targetData = targets.find(t => t.mesh === hitMesh);
        if (targetData) {
          damageTarget(targetData, clickPower);
        }
      }
    });

    // --- ペットAI（自動索敵システム） ---
    function petAIBehavior() {
      activePetMeshes.forEach(pet => {
        // 現在のターゲットが消滅していたらリセット
        if (pet.userData.targetId && !targets.some(t => t.id === pet.userData.targetId)) {
          pet.userData.targetId = null;
        }

        // ターゲットがいなければ、一番近いターゲットを探す
        if (!pet.userData.targetId && targets.length > 0) {
          // 各ペットが完全に同じものを狙わないよう、少しランダム性を持たせる
          const randomTarget = targets[Math.floor(Math.random() * targets.length)];
          pet.userData.targetId = randomTarget.id;
        }

        const currentTarget = targets.find(t => t.id === pet.userData.targetId);
        if (currentTarget) {
          // ターゲットの座標に向かって移動させる
          const tPos = currentTarget.mesh.position;
          
          // ターゲットの周りに群がるように、ペットごとに少し位置をずらす
          const pIdx = activePetMeshes.indexOf(pet);
          const angle = (pIdx * Math.PI * 2) / activePetMeshes.length;
          const targetX = tPos.x + Math.cos(angle) * 1.2;
          const targetZ = tPos.z + Math.sin(angle) * 1.2;

          // 線形補間でスムーズに移動（追従）
          pet.position.x += (targetX - pet.position.x) * 0.1;
          pet.position.z += (targetZ - pet.position.z) * 0.1;
          
          // 攻撃アタック（1秒ごとのタイマーとは別に、見た目をぴょんぴょんさせる）
          pet.position.y = 0.4 + Math.abs(Math.sin(Date.now() * 0.01 + pIdx)) * 0.5;
        } else {
          // ターゲットがない時はプレイヤー（カメラの手前あたり）に戻る
          pet.position.x += (0 - pet.position.x) * 0.05;
          pet.position.z += (6 - pet.position.z) * 0.05;
          pet.position.y = 0.4;
        }
      });
    }

    // ペットの自動攻撃タイマー (1200msごとにターゲットへ攻撃)
    setInterval(() => {
      activePetMeshes.forEach(pet => {
        if (pet.userData.targetId) {
          const targetData = targets.find(t => t.id === pet.userData.targetId);
          if (targetData) {
            damageTarget(targetData, pet.userData.power);
          }
        }
      });
    }, 1200);

    // 敵を定期的に最大までスポーンさせる
    setInterval(spawnTarget, 1000);

    // --- ガチャ・インベントリ関連 ---
    function rollGacha() {
      const cost = getGachaCost();
      if (coins < cost) { showNotification('コインが足りないよ！', 'red'); return; }
      coins -= cost;

      let rand = Math.random() * 10000;
      let selectedRarity = 'Common';
      let sum = 0;
      for (const [key, val] of Object.entries(rarities)) {
        sum += val.weight;
        if (rand <= sum) { selectedRarity = key; break; }
      }

      const options = petTemplates.filter(p => p.rarity === selectedRarity);
      const template = options[Math.floor(Math.random() * options.length)];
      const petPower = rarities[selectedRarity].mult * Math.pow(1.4, currentStage - 1);

      const newPet = {
        id: Date.now() + Math.random().toString(),
        name: template.name,
        rarity: template.rarity,
        mult: petPower,
        color3D: rarities[selectedRarity].color
      };

      inventory.push(newPet);
      updateUI();
      renderInventory();
      showNotification(`🎉 ${newPet.name} ゲット！`, rarities[selectedRarity].htmlColor);
    }

    function renderInventory() {
      const list = document.getElementById('pet-list');
      list.innerHTML = '';
      inventory.forEach(pet => {
        const isEquipped = equippedIds.includes(pet.id);
        const div = document.createElement('div');
        div.className = `pet-item ${isEquipped ? 'equipped' : ''}`;
        div.innerHTML = `${isEquipped ? '✅' : ''} <span style="color:${rarities[pet.rarity].htmlColor}; font-weight:bold;">[${rarities[pet.rarity].name}]</span> ${pet.name} <br>(P: ${formatNum(pet.mult)})`;
        div.onclick = () => toggleEquip(pet);
        list.appendChild(div);
      });
    }

    function toggleEquip(pet) {
      const idx = equippedIds.indexOf(pet.id);
      if (idx > -1) {
        equippedIds.splice(idx, 1);
        removePetFrom3D(pet.id);
      } else {
        if (equippedIds.length >= 3) { showNotification('装備は3体まで！', 'red'); return; }
        equippedIds.push(pet.id);
        addPetTo3D(pet);
      }
      renderInventory();
      updateUI();
    }

    function addPetTo3D(pet) {
      const geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
      const mat = new THREE.MeshLambertMaterial({ color: pet.color3D });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random()-0.5)*4, 0.4, 6);
      
      mesh.userData = { id: pet.id, power: pet.mult, targetId: null };
      scene.add(mesh);
      activePetMeshes.push(mesh);
    }

    function removePetFrom3D(id) {
      const index = activePetMeshes.findIndex(m => m.userData.id === id);
      if (index > -1) {
        scene.remove(activePetMeshes[index]);
        activePetMeshes.splice(index, 1);
      }
    }

    function updateUI() {
      document.getElementById('coin-count').innerText = formatNum(coins);
      document.getElementById('power-count').innerText = formatNum(clickPower);
      document.getElementById('equip-count').innerText = equippedIds.length;
      document.getElementById('gacha-cost-display').innerText = formatNum(getGachaCost());
      document.getElementById('stage-display').innerText = `エリア ${currentStage}`;

      // 上部の進行度バーの更新
      const progressPct = Math.min(100, (stageProgress / progressToClear) * 100);
      document.getElementById('progress-bar').style.width = `${progressPct}%`;
      document.getElementById('progress-label').innerText = `Next Area (${Math.floor(progressPct)}%)`;
    }

    function showNotification(text, color) {
      const notif = document.getElementById('notification');
      notif.innerText = text;
      notif.style.color = color;
      notif.style.display = 'block';
      setTimeout(() => notif.style.display = 'none', 2000);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- メインループ ---
    const vec = new THREE.Vector3();
    
    function animate() {
      requestAnimationFrame(animate);

      // ペットのAI移動を実行
      petAIBehavior();

      // 各ターゲットの頭上に文字情報を追従（Billboard制御）
      targets.forEach(t => {
        vec.set(t.mesh.position.x, t.mesh.position.y + (t.type.scale[1]/2) + 0.8, t.mesh.position.z);
        vec.project(camera);
        const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
        const y = (vec.y * -0.5 + 0.5) * window.innerHeight;
        t.billboard.style.left = `${x}px`;
        t.billboard.style.top = `${y}px`;
      });

      renderer.render(scene, camera);
    }

    // 初期生成
    for(let i=0; i<6; i++) spawnTarget();
    updateUI();
    animate();
  </script>
</body>
</html>
