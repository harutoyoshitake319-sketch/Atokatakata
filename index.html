<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D ペットシミュレーター🐾 - 100 Stages</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; background: #87CEEB; }
    /* UIレイヤー */
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .panel { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; pointer-events: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    #header { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: bold; color: #333; }
    .stage-text { font-size: 28px; color: #e11d48; margin-bottom: 5px; }
    
    #inventory { position: absolute; top: 20px; right: 20px; width: 220px; max-height: 70%; overflow-y: auto; }
    
    #gacha-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 15px 40px; font-size: 22px; font-weight: bold; background: #10b981; color: white;
      border: none; border-radius: 50px; cursor: pointer; pointer-events: auto;
      box-shadow: 0 5px 0 #047857; transition: transform 0.1s;
    }
    #gacha-btn:active { transform: translate(-50%, 5px); box-shadow: none; }
    
    #notification {
      position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; font-weight: bold; text-align: center; display: none;
      text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff; z-index: 10;
    }
    .pet-item { padding: 5px; border-bottom: 1px solid #ccc; font-size: 14px; cursor: pointer; }
    .pet-item.equipped { background: #e0e7ff; font-weight: bold; }

    /* 箱の上に浮かぶHPバー（原作のBillboardGuiを再現） */
    #chest-billboard {
      position: absolute; text-align: center; pointer-events: none;
      transform: translate(-50%, -100%); font-weight: bold; color: white;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }
    #chest-name { font-size: 18px; margin-bottom: 2px; }
    #chest-hp-bg { background: #333; width: 120px; height: 12px; border-radius: 6px; border: 2px solid white; margin: 0 auto; overflow: hidden;}
    #chest-hp-bar { background: #ef4444; width: 100%; height: 100%; transition: width 0.1s; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui-layer">
    <div id="header" class="panel">
      <div id="stage-display" class="stage-text">エリア 1 / 100</div>
      💰 コイン: <span id="coin-count">100</span><br>
      ⚔️ パワー: <span id="power-count">1</span>
    </div>
    
    <div id="inventory" class="panel">
      <div style="font-weight:bold; margin-bottom:10px;">🐾 ペット (装備: <span id="equip-count">0</span>/3)</div>
      <div id="pet-list"></div>
    </div>

    <button id="gacha-btn" onclick="rollGacha()">🥚 ガチャ (<span id="gacha-cost-display">100</span>💰)</button>
    <div id="notification"></div>
    
    <div id="chest-billboard">
      <div id="chest-name">木の箱</div>
      <div id="chest-hp-bg"><div id="chest-hp-bar"></div></div>
      <div style="font-size: 14px; margin-top:2px;" id="chest-hp-text">50 / 50</div>
    </div>
  </div>

  <script>
    // --- 巨大な数字をK, M, Bに変換する関数（本家リスペクト） ---
    function formatNum(num) {
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return Math.floor(num).toString();
    }

    // --- ゲームデータ設定 ---
    let currentStage = 1;
    const maxStage = 100;
    
    let coins = 100;
    let totalPower = 1;
    let inventory = [];
    let equippedIds = [];
    
    let currentChestHp = 50;
    let chestMaxHp = 50;

    // ステージごとの見た目テーマ（ループして使用）
    const stageThemes = [
      { bg: 0x87CEEB, floor: 0x4ade80, chestName: '最初の箱 📦', chestColor: 0x8b4513 },
      { bg: 0xfcb900, floor: 0xd97706, chestName: '砂漠の宝箱 🏜️', chestColor: 0xeab308 },
      { bg: 0x0f172a, floor: 0x334155, chestName: '洞窟の鉱石 🪨', chestColor: 0x94a3b8 },
      { bg: 0x38bdf8, floor: 0xe0f2fe, chestName: '氷の結晶 ❄️', chestColor: 0xa5f3fc },
      { bg: 0x4c1d95, floor: 0x7c3aed, chestName: '魔法の金庫 🔮', chestColor: 0xd8b4fe },
      { bg: 0x220000, floor: 0x7f1d1d, chestName: 'マグマの塊 🌋', chestColor: 0xf87171 }
    ];

    const rarities = {
      Common: { name: 'コモン', color: 0x94a3b8, weight: 5000, mult: 1, htmlColor: '#94a3b8' },
      Uncommon: { name: 'アンコモン', color: 0x22c55e, weight: 2500, mult: 3, htmlColor: '#22c55e' },
      Rare: { name: 'レア', color: 0x3b82f6, weight: 1500, mult: 8, htmlColor: '#3b82f6' },
      Epic: { name: 'エピック', color: 0xa855f7, weight: 700, mult: 25, htmlColor: '#a855f7' },
      Legendary: { name: 'レジェンダリー', color: 0xeab308, weight: 250, mult: 80, htmlColor: '#eab308' },
      Mythical: { name: 'ミシカル', color: 0xec4899, weight: 50, mult: 300, htmlColor: '#ec4899' }
    };

    const petTemplates = [
      { name: 'イヌ🐶', rarity: 'Common' }, { name: 'ネコ🐱', rarity: 'Common' }, { name: 'ネズミ🐭', rarity: 'Common' },
      { name: 'キツネ🦊', rarity: 'Uncommon' }, { name: 'クマ🐻', rarity: 'Uncommon' }, { name: 'パンダ🐼', rarity: 'Uncommon' },
      { name: 'ウシ🐮', rarity: 'Rare' }, { name: 'ブタ🐷', rarity: 'Rare' }, { name: 'カエル🐸', rarity: 'Rare' },
      { name: 'ユニコーン🦄', rarity: 'Epic' }, { name: 'ドラゴン🐉', rarity: 'Epic' }, { name: 'オオカミ🐺', rarity: 'Epic' },
      { name: '不死鳥🦅', rarity: 'Legendary' }, { name: 'ロボット🤖', rarity: 'Legendary' }, { name: 'ゴースト👻', rarity: 'Legendary' },
      { name: 'キングイヌ👑', rarity: 'Mythical' }, { name: '銀河ネコ🌌', rarity: 'Mythical' }, { name: '神龍⚡', rarity: 'Mythical' }
    ];

    // --- 3Dセットアップ ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x4ade80 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const chestGeo = new THREE.BoxGeometry(3, 3, 3);
    const chestMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
    const chest = new THREE.Mesh(chestGeo, chestMat);
    chest.position.y = 1.5;
    scene.add(chest);

    let activePetMeshes = [];

    // --- スケール（倍率）計算 ---
    function getGachaCost() {
      // ステージが上がるごとに値段が1.4倍になっていく
      return 100 * Math.pow(1.4, currentStage - 1);
    }
    function updateStageStats() {
      // HPと報酬もステージ進行に合わせて激増する
      const scale = Math.pow(1.4, currentStage - 1);
      chestMaxHp = 50 * scale;
      currentChestHp = chestMaxHp;
      
      const theme = stageThemes[(currentStage - 1) % stageThemes.length];
      scene.background = new THREE.Color(theme.bg);
      floor.material.color.setHex(theme.floor);
      chest.material.color.setHex(theme.chestColor);
      
      document.getElementById('chest-name').innerText = `Lv.${currentStage} ${theme.chestName}`;
      document.getElementById('stage-display').innerText = `エリア ${currentStage} / ${maxStage}`;
      
      updateUI();
    }

    // --- インタラクション ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('pointerdown', (event) => {
      if(event.target.tagName !== 'CANVAS') return;
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      
      if (raycaster.intersectObject(chest).length > 0) {
        attackChest(totalPower);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- ロジック ---
    function updateUI() {
      document.getElementById('coin-count').innerText = formatNum(coins);
      document.getElementById('power-count').innerText = formatNum(totalPower);
      document.getElementById('equip-count').innerText = equippedIds.length;
      document.getElementById('gacha-cost-display').innerText = formatNum(getGachaCost());

      // HPバーの更新
      const pct = Math.max(0, (currentChestHp / chestMaxHp) * 100);
      document.getElementById('chest-hp-bar').style.width = `${pct}%`;
      document.getElementById('chest-hp-text').innerText = `${formatNum(currentChestHp)} / ${formatNum(chestMaxHp)}`;
    }

    function attackChest(power) {
      currentChestHp -= power;
      
      // チェストのアニメーション
      chest.scale.set(0.85, 0.85, 0.85);
      setTimeout(() => chest.scale.set(1, 1, 1), 100);

      if (currentChestHp <= 0) {
        // 破壊報酬（ステージ×基礎報酬）
        const reward = 20 * Math.pow(1.4, currentStage - 1);
        coins += reward;
        
        if (currentStage < maxStage) {
          currentStage++;
          showNotification(`エリア ${currentStage} へ進んだ！`, '#10b981');
        } else {
          showNotification(`100ステージ制覇！`, '#eab308');
        }
        updateStageStats();
      } else {
        updateUI();
      }
    }

    function rollGacha() {
      const cost = getGachaCost();
      if (coins < cost) {
        showNotification('コインが足りないよ！', 'red');
        return;
      }
      coins -= cost;

      let rand = Math.random() * 10000;
      let selectedRarity = 'Common';
      let sum = 0;
      for (const [key, val] of Object.entries(rarities)) {
        sum += val.weight;
        if (rand <= sum) { selectedRarity = key; break; }
      }

      const options = petTemplates.filter(p => p.rarity === selectedRarity);
      const template = options[Math.floor(Math.random() * options.length)];
      
      // ペットのパワーも「引いた時のステージ」に合わせて強くなるように調整
      const petPower = rarities[selectedRarity].mult * Math.pow(1.3, currentStage - 1);

      const newPet = {
        id: Date.now() + Math.random().toString(),
        name: template.name,
        rarity: template.rarity,
        mult: petPower,
        color3D: rarities[selectedRarity].color
      };

      inventory.push(newPet);
      updateUI();
      renderInventory();
      showNotification(`🎉 ${newPet.name} ゲット！`, rarities[selectedRarity].htmlColor);
    }

    function showNotification(text, color) {
      const notif = document.getElementById('notification');
      notif.innerText = text;
      notif.style.color = color;
      notif.style.display = 'block';
      setTimeout(() => notif.style.display = 'none', 2000);
    }

    function renderInventory() {
      const list = document.getElementById('pet-list');
      list.innerHTML = '';
      inventory.forEach(pet => {
        const isEquipped = equippedIds.includes(pet.id);
        const div = document.createElement('div');
        div.className = `pet-item ${isEquipped ? 'equipped' : ''}`;
        div.innerHTML = `${isEquipped ? '✅' : ''} <span style="color:${rarities[pet.rarity].htmlColor}; font-weight:bold;">[${rarities[pet.rarity].name}]</span> ${pet.name} <br>(P: ${formatNum(pet.mult)})`;
        div.onclick = () => toggleEquip(pet);
        list.appendChild(div);
      });
    }

    function toggleEquip(pet) {
      const idx = equippedIds.indexOf(pet.id);
      if (idx > -1) {
        equippedIds.splice(idx, 1);
        removePetFrom3D(pet.id);
      } else {
        if (equippedIds.length >= 3) {
          showNotification('装備は3体まで！', 'red');
          return;
        }
        equippedIds.push(pet.id);
        addPetTo3D(pet);
      }
      recalculatePower();
      renderInventory();
    }

    function recalculatePower() {
      let powerSum = 1;
      equippedIds.forEach(id => {
        const p = inventory.find(x => x.id === id);
        if (p) powerSum += p.mult;
      });
      totalPower = powerSum;
      updateUI();
    }

    function addPetTo3D(pet) {
      const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
      const mat = new THREE.MeshLambertMaterial({ color: pet.color3D });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData = { id: pet.id, angle: Math.random() * Math.PI * 2 };
      scene.add(mesh);
      activePetMeshes.push(mesh);
    }

    function removePetFrom3D(id) {
      const index = activePetMeshes.findIndex(m => m.userData.id === id);
      if (index > -1) {
        scene.remove(activePetMeshes[index]);
        activePetMeshes.splice(index, 1);
      }
    }

    // --- 自動攻撃タイマー ---
    setInterval(() => {
      let petPower = totalPower - 1;
      if (petPower > 0) {
        attackChest(petPower);
        activePetMeshes.forEach(mesh => {
          mesh.position.y = 1.5;
          setTimeout(() => mesh.position.y = 0.4, 100);
        });
      }
    }, 1000);

    // --- 毎フレーム描画 ---
    const chestBillboard = document.getElementById('chest-billboard');

    function animate() {
      requestAnimationFrame(animate);

      // ペットは「箱（チェスト）の周り」を囲むように回転する（原作再現）
      activePetMeshes.forEach((mesh, index) => {
        mesh.userData.angle += 0.03;
        const radius = 3;
        const offsetAngle = mesh.userData.angle + (index * (Math.PI * 2 / activePetMeshes.length));
        
        mesh.position.x = chest.position.x + Math.cos(offsetAngle) * radius;
        mesh.position.z = chest.position.z + Math.sin(offsetAngle) * radius;
        mesh.rotation.x += 0.01;
        mesh.rotation.y += 0.02;
        
        if(mesh.position.y !== 1.5 && mesh.position.y !== 0.4) {
             mesh.position.y = 0.4;
        }
      });

      // 箱の上に名前とHPを追従させる（BillboardGui再現）
      const vector = new THREE.Vector3(chest.position.x, chest.position.y + 2.5, chest.position.z);
      vector.project(camera);
      const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
      const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
      chestBillboard.style.left = `${x}px`;
      chestBillboard.style.top = `${y}px`;

      renderer.render(scene, camera);
    }

    // ゲーム開始初期化
    updateStageStats();
    animate();
  </script>
</body>
</html>
