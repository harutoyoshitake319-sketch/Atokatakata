<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D ペットシミュレーター🐾</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; background: #87CEEB; }
    /* UIレイヤー（3D画面の上に重ねる） */
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .panel { background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px; pointer-events: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    #header { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: bold; color: #333; }
    #inventory { position: absolute; top: 20px; right: 20px; width: 220px; max-height: 70%; overflow-y: auto; }
    
    #gacha-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 15px 40px; font-size: 22px; font-weight: bold; background: #10b981; color: white;
      border: none; border-radius: 50px; cursor: pointer; pointer-events: auto;
      box-shadow: 0 5px 0 #047857; transition: transform 0.1s;
    }
    #gacha-btn:active { transform: translate(-50%, 5px); box-shadow: none; }
    
    #notification {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; font-weight: bold; text-align: center; display: none;
      text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
    }
    .pet-item { padding: 5px; border-bottom: 1px solid #ccc; font-size: 14px; cursor: pointer; }
    .pet-item.equipped { background: #e0e7ff; font-weight: bold; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui-layer">
    <div id="header" class="panel">
      💰 コイン: <span id="coin-count">100</span><br>
      ⚔️ パワー: <span id="power-count">1</span><br>
      <span style="font-size: 12px; font-weight: normal; color: #666;">（中央の箱をクリックで攻撃！）</span>
    </div>
    
    <div id="inventory" class="panel">
      <div style="font-weight:bold; margin-bottom:10px;">🐾 ペット (装備: <span id="equip-count">0</span>/3)</div>
      <div id="pet-list"></div>
    </div>

    <button id="gacha-btn" onclick="rollGacha()">🥚 ガチャ (100💰)</button>
    <div id="notification"></div>
  </div>

  <script>
    // --- ゲームデータ設定 ---
    let coins = 100;
    let totalPower = 1;
    let inventory = [];
    let equippedIds = [];

    // レアリティ設定（色情報付き）
    const rarities = {
      Common: { name: 'コモン', color: 0x94a3b8, weight: 5000, mult: 1, htmlColor: '#94a3b8' },
      Uncommon: { name: 'アンコモン', color: 0x22c55e, weight: 2500, mult: 3, htmlColor: '#22c55e' },
      Rare: { name: 'レア', color: 0x3b82f6, weight: 1500, mult: 8, htmlColor: '#3b82f6' },
      Epic: { name: 'エピック', color: 0xa855f7, weight: 700, mult: 25, htmlColor: '#a855f7' },
      Legendary: { name: 'レジェンダリー', color: 0xeab308, weight: 250, mult: 80, htmlColor: '#eab308' },
      Mythical: { name: 'ミシカル', color: 0xec4899, weight: 50, mult: 300, htmlColor: '#ec4899' }
    };

    // 30体のペットリスト
    const petTemplates = [
      { name: 'イヌ🐶', rarity: 'Common' }, { name: 'ネコ🐱', rarity: 'Common' }, { name: 'ネズミ🐭', rarity: 'Common' }, { name: 'ハムスター🐹', rarity: 'Common' }, { name: 'ウサギ🐰', rarity: 'Common' }, { name: 'アヒル🦆', rarity: 'Common' },
      { name: 'キツネ🦊', rarity: 'Uncommon' }, { name: 'クマ🐻', rarity: 'Uncommon' }, { name: 'パンダ🐼', rarity: 'Uncommon' }, { name: 'コアラ🐨', rarity: 'Uncommon' }, { name: 'トラ🐯', rarity: 'Uncommon' }, { name: 'ライオン🦁', rarity: 'Uncommon' },
      { name: 'ウシ🐮', rarity: 'Rare' }, { name: 'ブタ🐷', rarity: 'Rare' }, { name: 'カエル🐸', rarity: 'Rare' }, { name: 'サル🐵', rarity: 'Rare' }, { name: 'ニワトリ🐔', rarity: 'Rare' }, { name: 'ペンギン🐧', rarity: 'Rare' },
      { name: 'ユニコーン🦄', rarity: 'Epic' }, { name: 'ドラゴン🐉', rarity: 'Epic' }, { name: 'オオカミ🐺', rarity: 'Epic' }, { name: 'タコ🐙', rarity: 'Epic' }, { name: 'エイリアン👽', rarity: 'Epic' },
      { name: '不死鳥🦅', rarity: 'Legendary' }, { name: 'ロボット🤖', rarity: 'Legendary' }, { name: 'ゴースト👻', rarity: 'Legendary' }, { name: 'アクマ😈', rarity: 'Legendary' },
      { name: 'キングイヌ👑', rarity: 'Mythical' }, { name: '銀河ネコ🌌', rarity: 'Mythical' }, { name: '神龍⚡', rarity: 'Mythical' }
    ];

    // --- 3D描画 (Three.js) セットアップ ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // 空の水色

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 光源
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // 地面
    const floorGeo = new THREE.PlaneGeometry(50, 50);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x4ade80 }); // 草の色
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // チェスト（攻撃対象の箱）
    const chestGeo = new THREE.BoxGeometry(3, 3, 3);
    const chestMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 }); // 木の色
    const chest = new THREE.Mesh(chestGeo, chestMat);
    chest.position.y = 1.5;
    scene.add(chest);

    // 装備中のペットを3D空間に表示するための配列
    let activePetMeshes = [];

    // --- インタラクション（クリック判定） ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('pointerdown', (event) => {
      // UIをクリックした時は判定しない
      if(event.target.tagName !== 'CANVAS') return;

      // マウス座標を正規化 (-1 to +1)
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(chest);

      // チェストがクリックされたら
      if (intersects.length > 0) {
        attackChest(totalPower);
      }
    });

    // 画面サイズが変わった時の対応
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- ゲームのロジック ---
    function updateUI() {
      document.getElementById('coin-count').innerText = coins;
      document.getElementById('power-count').innerText = totalPower;
      document.getElementById('equip-count').innerText = equippedIds.length;
    }

    function attackChest(power) {
      // コインをゲット
      coins += power;
      updateUI();

      // チェストを叩いた時のアニメーション（少し縮んで戻る）
      chest.scale.set(0.9, 0.9, 0.9);
      setTimeout(() => chest.scale.set(1, 1, 1), 100);
    }

    function rollGacha() {
      if (coins < 100) {
        showNotification('コインが足りないよ！', 'red');
        return;
      }
      coins -= 100;

      // 確率計算
      let rand = Math.random() * 10000;
      let selectedRarity = 'Common';
      let sum = 0;
      for (const [key, val] of Object.entries(rarities)) {
        sum += val.weight;
        if (rand <= sum) { selectedRarity = key; break; }
      }

      // ペット抽選
      const options = petTemplates.filter(p => p.rarity === selectedRarity);
      const template = options[Math.floor(Math.random() * options.length)];
      
      const newPet = {
        id: Date.now() + Math.random().toString(),
        name: template.name,
        rarity: template.rarity,
        mult: rarities[selectedRarity].mult,
        color3D: rarities[selectedRarity].color
      };

      inventory.push(newPet);
      updateUI();
      renderInventory();
      showNotification(`🎉 ${newPet.name} をゲット！`, rarities[selectedRarity].htmlColor);
    }

    function showNotification(text, color) {
      const notif = document.getElementById('notification');
      notif.innerText = text;
      notif.style.color = color;
      notif.style.display = 'block';
      setTimeout(() => notif.style.display = 'none', 2000);
    }

    function renderInventory() {
      const list = document.getElementById('pet-list');
      list.innerHTML = '';
      
      inventory.forEach(pet => {
        const isEquipped = equippedIds.includes(pet.id);
        const div = document.createElement('div');
        div.className = `pet-item ${isEquipped ? 'equipped' : ''}`;
        div.innerHTML = `${isEquipped ? '✅' : ''} <span style="color:${rarities[pet.rarity].htmlColor}; font-weight:bold;">[${rarities[pet.rarity].name}]</span> ${pet.name} (P:${pet.mult})`;
        div.onclick = () => toggleEquip(pet);
        list.appendChild(div);
      });
    }

    function toggleEquip(pet) {
      const idx = equippedIds.indexOf(pet.id);
      if (idx > -1) {
        equippedIds.splice(idx, 1);
        removePetFrom3D(pet.id);
      } else {
        if (equippedIds.length >= 3) {
          showNotification('装備は3体まで！', 'red');
          return;
        }
        equippedIds.push(pet.id);
        addPetTo3D(pet);
      }
      recalculatePower();
      renderInventory();
    }

    function recalculatePower() {
      let powerSum = 1;
      equippedIds.forEach(id => {
        const p = inventory.find(x => x.id === id);
        if (p) powerSum += p.mult;
      });
      totalPower = powerSum;
      updateUI();
    }

    // --- ペットの3D表示管理 ---
    function addPetTo3D(pet) {
      // ペットを小さなキューブとして作成
      const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
      const mat = new THREE.MeshLambertMaterial({ color: pet.color3D });
      const mesh = new THREE.Mesh(geo, mat);
      
      mesh.userData = { id: pet.id, angle: Math.random() * Math.PI * 2 }; // 回転角度の初期値
      scene.add(mesh);
      activePetMeshes.push(mesh);
    }

    function removePetFrom3D(id) {
      const index = activePetMeshes.findIndex(m => m.userData.id === id);
      if (index > -1) {
        scene.remove(activePetMeshes[index]);
        activePetMeshes.splice(index, 1);
      }
    }

    // --- 自動攻撃タイマー ---
    setInterval(() => {
      let petPower = totalPower - 1; // ペットの合計パワーのみ
      if (petPower > 0) {
        attackChest(petPower);
        // 攻撃時にペットを少し跳ねさせる
        activePetMeshes.forEach(mesh => {
          mesh.position.y = 1.5;
          setTimeout(() => mesh.position.y = 0.4, 100);
        });
      }
    }, 1000);

    // --- アニメーションループ (毎フレーム実行) ---
    function animate() {
      requestAnimationFrame(animate);

      // 装備中のペットをカメラ（プレイヤー）の周りでフワフワ回転させる
      activePetMeshes.forEach((mesh, index) => {
        mesh.userData.angle += 0.02; // 回転スピード
        const radius = 4; // 中心からの距離
        // ペット同士が重ならないように角度をずらす
        const offsetAngle = mesh.userData.angle + (index * (Math.PI * 2 / activePetMeshes.length));
        
        mesh.position.x = Math.cos(offsetAngle) * radius;
        mesh.position.z = Math.sin(offsetAngle) * radius + 5; // カメラより少し前に配置
        mesh.rotation.x += 0.01;
        mesh.rotation.y += 0.02;
        
        // 攻撃アニメーション中以外は基本の高さを維持
        if(mesh.position.y !== 1.5 && mesh.position.y !== 0.4) {
             mesh.position.y = 0.4;
        }
      });

      renderer.render(scene, camera);
    }

    animate(); // アニメーション開始
  </script>
</body>
</html>
